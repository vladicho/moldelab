services:
  - type: web
    name: moldelab
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: MOLDELAB_JWT_SECRET
        generateValue: true
      - key: MOLDELAB_BOOTSTRAP_EMAIL
        sync: false
      - key: MOLDELAB_BOOTSTRAP_PASSWORD
        sync: false
