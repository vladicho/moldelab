<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MoldeLab Scanner Mobile</title>
    <style>
      body {
        margin: 0;
        background: #0f172a;
        color: #f8fafc;
        font-family: Arial, sans-serif;
      }

      main {
        display: grid;
        gap: 14px;
        padding: 14px;
      }

      video {
        width: 100%;
        max-height: 70vh;
        border: 1px solid #334155;
        border-radius: 8px;
        background: #020617;
        object-fit: contain;
      }

      .actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      button,
      label {
        border: 1px solid #38bdf8;
        border-radius: 8px;
        padding: 13px;
        background: #0891b2;
        color: white;
        font-weight: 800;
        text-align: center;
      }

      input {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 12px;
        background: #1e293b;
        color: white;
      }

      .fallback {
        display: grid;
        gap: 8px;
      }

      small {
        color: #cbd5e1;
        line-height: 1.35;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>MoldeLab Scanner</h1>
      <video id="preview" playsinline muted autoplay></video>
      <div class="actions">
        <button id="startCamera">Abrir camera</button>
        <button id="sendFrame">Enviar frame</button>
        <button id="toggleLive">Ao vivo: off</button>
      </div>
      <div class="fallback">
        <label for="fallbackPhoto">Foto fallback</label>
        <input id="fallbackPhoto" type="file" accept="image/*" capture="environment" />
      </div>
      <small id="status">Conectando ao app Windows...</small>
    </main>
    <script src="mobile-scanner.js"></script>
  </body>
</html>
